<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hoverbit</title>
<meta name="description" content="Hoverbit builds fast, native, privacy-respecting apps for macOS.">
<link rel="icon" href="/textbit/favicon.svg" type="image/svg+xml">
<style>
  :root{--blue1:#389BFE;--blue2:#177EED;--accent:#1E86ED;--ink:#1d1d1f;--muted:#5f6672;--bg:#ffffff;--soft:#f5f7fa;--line:#e6e9ee;}
  @media (prefers-color-scheme:dark){:root{--ink:#f2f4f8;--muted:#a3aab8;--bg:#0f1115;--soft:#161922;--line:#262b36;--accent:#5aa9f5;}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
  h1{font-size:40px;letter-spacing:-.02em;margin:0 0 8px}
  p{color:var(--muted);font-size:18px;max-width:520px;margin:0 0 30px}
  .card{display:flex;align-items:center;gap:16px;background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:18px 22px;text-align:left}
  .card svg{width:56px;height:56px;border-radius:13px;display:block;flex:0 0 auto}
  .card h2{margin:0;font-size:19px}
  .card p{margin:2px 0 0;font-size:15px}
  .card .go{margin-left:8px;font-weight:600;white-space:nowrap}
  footer{padding:22px;color:var(--muted);font-size:14px;text-align:center;border-top:1px solid var(--line)}
</style>
</head>
<body>
<main>
  <h1>Hoverbit</h1>
  <p>Fast, native, privacy-respecting apps for macOS.</p>
  <a class="card" href="/textbit">
    <svg viewBox="0 0 100 100" aria-hidden="true"><defs><linearGradient id="h" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#389BFE"/><stop offset="1" stop-color="#177EED"/></linearGradient></defs><rect width="100" height="100" rx="18.5" fill="url(#h)"/><g fill="#fff"><rect x="39.05" y="21.3" width="21.9" height="5" rx="2.5"/><rect x="44.55" y="29.95" width="10.9" height="10.9" rx="2.4"/><rect x="44.55" y="44.65" width="10.9" height="10.9" rx="2.4"/><rect x="44.55" y="59.15" width="10.9" height="10.9" rx="2.4" fill="#D5E8FC"/><rect x="39.05" y="73.7" width="21.9" height="5" rx="2.5"/></g></svg>
    <span>
      <h2>TextBit</h2>
      <p>Fast, native text &amp; code editor</p>
    </span>
    <span class="go">View →</span>
  </a>
</main>
<footer>© 2026 Hoverbit. All rights reserved.</footer>
</body>
</html>
